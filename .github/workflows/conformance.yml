name: conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  conformance-pdfa:
    runs-on: ubuntu-latest
    name: PDF/A conformance (veraPDF)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, zlib, openssl, gd
          coverage: none

      - name: Setup Java (veraPDF requires a JRE)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies (locked)
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Cache fonts
        uses: actions/cache@v4
        with:
          path: .cache/fonts
          key: liberation-fonts-2.1.5

      - name: Fetch fonts
        run: bash scripts/fetch-fonts.sh

      - name: Install veraPDF
        run: |
          curl -sSL -o /tmp/verapdf-installer.zip https://software.verapdf.org/releases/verapdf-installer.zip
          unzip -q /tmp/verapdf-installer.zip -d /tmp
          sed "s|@INSTALL_PATH@|$HOME/verapdf|" scripts/conformance/verapdf-auto-install.xml > /tmp/verapdf-auto.xml
          /tmp/verapdf-greenfield-*/verapdf-install /tmp/verapdf-auto.xml
          "$HOME/verapdf/verapdf" --version

      - name: Generate reference PDF/A documents
        run: php scripts/conformance/generate.php

      - name: Validate with veraPDF
        run: VERAPDF="$HOME/verapdf/verapdf" bash scripts/conformance/verapdf.sh

      - name: Publish job summary
        if: always()
        run: cat build/conformance/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload conformance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-pdfa
          path: build/conformance/

  conformance-pdfx:
    runs-on: ubuntu-latest
    name: PDF/X conformance (Ghostscript)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, zlib, openssl, gd
          coverage: none

      - name: Install Ghostscript
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ghostscript

      - name: Install dependencies (locked)
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Cache fonts
        uses: actions/cache@v4
        with:
          path: .cache/fonts
          key: liberation-fonts-2.1.5

      - name: Fetch fonts
        run: bash scripts/fetch-fonts.sh

      - name: Generate reference PDF/X documents
        run: php scripts/conformance/generate.php

      - name: Validate PDF/X structure
        run: python3 scripts/conformance/pdfx-check.py

      - name: Publish job summary
        if: always()
        run: cat build/conformance/summary-pdfx.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload conformance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-pdfx
          path: |
            build/conformance/pdfx-*.pdf
            build/conformance/summary-pdfx.md

  torture-smoke:
    runs-on: ubuntu-latest
    name: Torture set (poppler + Ghostscript)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, zlib, openssl, gd
          coverage: none

      - name: Install poppler and Ghostscript
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils ghostscript

      - name: Install dependencies (locked)
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Cache fonts
        uses: actions/cache@v4
        with:
          path: .cache/fonts
          key: fonts-liberation-2.1.5-amiri-droid

      - name: Fetch fonts
        run: bash scripts/fetch-fonts.sh

      - name: Generate torture set
        run: php examples/torture/generate.php

      - name: Render smoke (poppler + Ghostscript)
        run: bash scripts/conformance/torture-smoke.sh

      - name: Run cookbook examples
        run: for f in examples/0*.php; do php "$f"; done

      - name: Render smoke for cookbook samples
        run: bash scripts/conformance/torture-smoke.sh samples summary-samples.md

      - name: Publish job summary
        if: always()
        run: |
          cat build/conformance/summary-torture.md >> "$GITHUB_STEP_SUMMARY"
          cat build/conformance/summary-samples.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload torture set and renders
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: torture-set
          path: |
            examples/torture/out/
            build/torture-render/

  visual-regression:
    runs-on: ubuntu-latest
    name: Visual regression (poppler)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, zlib, openssl, gd
          coverage: none

      - name: Install poppler and ImageMagick
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils imagemagick

      - name: Install dependencies (locked)
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Cache fonts
        uses: actions/cache@v4
        with:
          path: .cache/fonts
          key: liberation-fonts-2.1.5

      - name: Fetch fonts
        run: bash scripts/fetch-fonts.sh

      - name: Generate reference documents
        run: php scripts/conformance/generate.php

      - name: Compare renders against goldens
        run: bash scripts/conformance/visual-check.sh

      - name: Publish job summary
        if: always()
        run: cat build/conformance/summary-visual.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload renders and diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression
          path: build/visual/
