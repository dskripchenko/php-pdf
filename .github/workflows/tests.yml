name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    name: PHP ${{ matrix.php }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, zlib, openssl, gd
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install poppler-utils (pdftotext, for text-extraction tests)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils

      - name: Install dependencies (locked)
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Cache fonts
        uses: actions/cache@v4
        with:
          path: .cache/fonts
          key: liberation-fonts-2.1.5

      - name: Fetch fonts
        run: bash scripts/fetch-fonts.sh

      - name: Run tests
        run: vendor/bin/phpunit

  conformance-pdfa:
    runs-on: ubuntu-latest
    name: PDF/A conformance (veraPDF)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, zlib, openssl, gd
          coverage: none

      - name: Setup Java (veraPDF requires a JRE)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies (locked)
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Cache fonts
        uses: actions/cache@v4
        with:
          path: .cache/fonts
          key: liberation-fonts-2.1.5

      - name: Fetch fonts
        run: bash scripts/fetch-fonts.sh

      - name: Install veraPDF
        run: |
          curl -sSL -o /tmp/verapdf-installer.zip https://software.verapdf.org/releases/verapdf-installer.zip
          unzip -q /tmp/verapdf-installer.zip -d /tmp
          sed "s|@INSTALL_PATH@|$HOME/verapdf|" scripts/conformance/verapdf-auto-install.xml > /tmp/verapdf-auto.xml
          /tmp/verapdf-greenfield-*/verapdf-install /tmp/verapdf-auto.xml
          "$HOME/verapdf/verapdf" --version

      - name: Generate reference PDF/A documents
        run: php scripts/conformance/generate.php

      - name: Validate with veraPDF
        run: VERAPDF="$HOME/verapdf/verapdf" bash scripts/conformance/verapdf.sh

      - name: Publish job summary
        if: always()
        run: cat build/conformance/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload conformance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-pdfa
          path: build/conformance/

  static-analysis:
    runs-on: ubuntu-latest
    name: PHPStan (level 6)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, zlib, openssl, gd
          coverage: none

      - name: Install dependencies (locked)
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: composer stan
