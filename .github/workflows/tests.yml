name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']

    name: PHP ${{ matrix.php }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, zlib, openssl, gd
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install poppler-utils (pdftotext, for text-extraction tests)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils

      - name: Install dependencies (locked)
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Cache fonts
        uses: actions/cache@v4
        with:
          path: .cache/fonts
          key: fonts-liberation-2.1.5-amiri-droid

      - name: Fetch fonts
        run: bash scripts/fetch-fonts.sh

      - name: Run tests
        run: vendor/bin/phpunit

  static-analysis:
    runs-on: ubuntu-latest
    name: PHPStan (level 6)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, zlib, openssl, gd
          coverage: none

      - name: Install dependencies (locked)
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: composer stan
